# LeRobot Agent Console on VKE.
#
# One container = console (lerobot + slim hermes). By default it serves plain
# HTTP on :8080; an L4 CLB forwards :80 straight to it. `kubectl exec` into the
# pod gives you the shell the UI drives. The UI shows a small "未加密 (HTTP)"
# warning whenever TLS is off.
#
# Want HTTPS instead? The console can serve TLS natively — create a cert secret
# and set the two env vars back (see the commented block below):
#   openssl req -x509 -nodes -newkey rsa:2048 -days 825 \
#     -keyout tls.key -out tls.crt -subj "/CN=lerobot-console" \
#     -addext "subjectAltName=IP:<your-clb-ip>,DNS:lerobot-console"
#   kubectl create secret tls lerobot-console-tls --cert=tls.crt --key=tls.key
# then re-add CONSOLE_TLS_CERT/KEY + the tls volume/mount and flip the probes to
# scheme: HTTPS and the Service to port 443.
#
# Reminder: build/push the console image GZIP (VKE node containerd 1.6.x rejects zstd).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lerobot-console
  labels: { app: lerobot-console }
spec:
  replicas: 1
  strategy: { type: Recreate }     # single-writer PVC; never two pods at once
  selector:
    matchLabels: { app: lerobot-console }
  template:
    metadata:
      labels: { app: lerobot-console }
    spec:
      containers:
        - name: console
          image: iaas-us-cn-beijing.cr.volces.com/physicalai/lerobot-console:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: PORT, value: "8080" }
            # The lerobot checkout in the base image (NOT named LEROBOT_HOME — that
            # is lerobot's own deprecated cache var, which lerobot rejects if set).
            - { name: CONSOLE_WORKDIR, value: "/lerobot" }
            - { name: CONSOLE_SHELL, value: "/bin/bash" }
            # The base image bakes HOME=/home/user_lerobot (700, owned by
            # user_lerobot); as root (DAC_OVERRIDE dropped in-container) that dir
            # is unreadable -> "Home directory not accessible: Permission denied".
            # Point HOME at the writable, persistent PVC instead.
            - { name: HOME, value: "/opt/data" }
            - { name: HERMES_CHAT_SKILL, value: "robot_sft" }
            - { name: HERMES_HOME, value: "/opt/data" }
            # Default: plain HTTP (the UI shows a "未加密" warning). For HTTPS, mount
            # a cert secret and set CONSOLE_TLS_CERT + CONSOLE_TLS_KEY (see header).
            # Single-user login (page-wide HTTP Basic). From the Secret.
            - name: CONSOLE_USER
              valueFrom: { secretKeyRef: { name: lerobot-console-auth, key: user } }
            - name: CONSOLE_PASSWORD
              valueFrom: { secretKeyRef: { name: lerobot-console-auth, key: password } }
          # The console drives lerobot training/eval/inference in-pod, so it needs
          # real compute + a GPU. requests==limits (Guaranteed QoS); the GPU is an
          # all-or-nothing device — claiming 1 takes the whole card.
          resources:
            requests: { cpu: "16", memory: "128Gi", nvidia.com/gpu: "1" }
            limits:   { cpu: "16", memory: "128Gi", nvidia.com/gpu: "1" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080, scheme: HTTP }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080, scheme: HTTP }
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - { name: hermes-home, mountPath: /opt/data }
      volumes:
        - name: hermes-home
          persistentVolumeClaim: { claimName: lerobot-console-hermes }
