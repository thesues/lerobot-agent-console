# LeRobot Agent Console on VKE.
#
# One container = console (:8080) + slim hermes + full LeRobot env. `kubectl exec`
# into the pod gives you the same shell the browser console drives.
#
# Reminder: build/push the image GZIP (VKE node containerd 1.6.x rejects zstd).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lerobot-console
  labels: { app: lerobot-console }
spec:
  replicas: 1
  strategy: { type: Recreate }     # single-writer PVC; never two pods at once
  selector:
    matchLabels: { app: lerobot-console }
  template:
    metadata:
      labels: { app: lerobot-console }
    spec:
      containers:
        - name: console
          # Replace with your gzip-pushed console image tag.
          image: iaas-us-cn-beijing.cr.volces.com/physicalai/lerobot-console:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: PORT, value: "8080" }
            - { name: LEROBOT_HOME, value: "/workspace/lerobot" }
            - { name: CONSOLE_SHELL, value: "/bin/bash" }
            - { name: HERMES_CHAT_SKILL, value: "robot_sft" }
            # hermes config (Ark key the user enters) + sessions + skills persist here.
            - { name: HERMES_HOME, value: "/opt/data" }
            # Single-user login (page-wide HTTP Basic). From the Secret below.
            - name: CONSOLE_USER
              valueFrom: { secretKeyRef: { name: lerobot-console-auth, key: user } }
            - name: CONSOLE_PASSWORD
              valueFrom: { secretKeyRef: { name: lerobot-console-auth, key: password } }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "4Gi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - { name: hermes-home, mountPath: /opt/data }
      volumes:
        - name: hermes-home
          persistentVolumeClaim: { claimName: lerobot-console-hermes }
