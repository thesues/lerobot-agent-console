# LeRobot Agent Console on VKE.
#
# Pod = console (lerobot + slim hermes, :8080) + a Caddy sidecar that terminates
# HTTPS with an auto Let's Encrypt cert and reverse-proxies to the console.
# `kubectl exec` into the `console` container gives you the shell the UI drives.
#
# Reminder: build/push the console image GZIP (VKE node containerd 1.6.x rejects zstd).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lerobot-console
  labels: { app: lerobot-console }
spec:
  replicas: 1
  strategy: { type: Recreate }     # single-writer PVCs; never two pods at once
  selector:
    matchLabels: { app: lerobot-console }
  template:
    metadata:
      labels: { app: lerobot-console }
    spec:
      containers:
        - name: console
          # Replace with your gzip-pushed console image tag.
          image: iaas-us-cn-beijing.cr.volces.com/physicalai/lerobot-console:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: PORT, value: "8080" }
            - { name: LEROBOT_HOME, value: "/lerobot" }
            - { name: CONSOLE_SHELL, value: "/bin/bash" }
            - { name: HERMES_CHAT_SKILL, value: "robot_sft" }
            # hermes config (Ark key the user enters) + sessions + skills persist here.
            - { name: HERMES_HOME, value: "/opt/data" }
            # Single-user login (page-wide HTTP Basic). From the Secret below.
            - name: CONSOLE_USER
              valueFrom: { secretKeyRef: { name: lerobot-console-auth, key: user } }
            - name: CONSOLE_PASSWORD
              valueFrom: { secretKeyRef: { name: lerobot-console-auth, key: password } }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2", memory: "4Gi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - { name: hermes-home, mountPath: /opt/data }

        # --- auto-HTTPS sidecar (Caddy) ------------------------------------- #
        - name: caddy
          image: caddy:2-alpine
          args: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
          env:
            # Per-user: the domain whose DNS points at the LB, + ACME contact email.
            - { name: CONSOLE_DOMAIN, value: "console.example.com" }
            - { name: ACME_EMAIL, value: "admin@example.com" }
          ports:
            - { name: https, containerPort: 443 }
            - { name: http, containerPort: 80 }    # ACME HTTP-01 + HTTP->HTTPS redirect
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - { name: caddy-config, mountPath: /etc/caddy }
            - { name: caddy-data, mountPath: /data }      # issued certs persist here
            - { name: caddy-state, mountPath: /config }
      volumes:
        - name: hermes-home
          persistentVolumeClaim: { claimName: lerobot-console-hermes }
        - name: caddy-config
          configMap: { name: lerobot-console-caddy }
        - name: caddy-data
          persistentVolumeClaim: { claimName: lerobot-console-caddy-data }
        - name: caddy-state
          emptyDir: {}
