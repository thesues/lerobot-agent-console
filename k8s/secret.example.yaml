# Single-user login for the whole console (page-wide HTTP Basic auth).
# Do NOT commit real credentials — copy to secret.yaml and fill in, or create it
# imperatively:
#
#   kubectl create secret generic lerobot-console-auth \
#     --from-literal=user=lerobot \
#     --from-literal=password='<a-strong-password>'
#
apiVersion: v1
kind: Secret
metadata:
  name: lerobot-console-auth
  labels: { app: lerobot-console }
type: Opaque
stringData:
  user: lerobot
  password: change-me-please
