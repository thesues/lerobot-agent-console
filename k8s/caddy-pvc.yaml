# Persists Caddy's /data — the issued Let's Encrypt certs + ACME account key.
# Without this, a pod restart re-issues certs and can hit Let's Encrypt rate limits.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lerobot-console-caddy-data
  labels: { app: lerobot-console }
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
  # storageClassName: ebs-ssd   # set to your VKE default/StorageClass if needed
