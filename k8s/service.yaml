# ClusterIP service for the console. Reach it via `kubectl port-forward`:
#
#   kubectl port-forward svc/lerobot-console 8080:8080
#   open http://localhost:8080
#
# NOTE: on the iaas-test03 account public inbound is blocked at the platform
# level (see lerobot VOLCENGINE_DEPLOY_NOTES.md), so a public LoadBalancer will
# TCP-handshake but never return app data. Use port-forward, or an account
# where public inbound works. A LoadBalancer variant is included but commented.
apiVersion: v1
kind: Service
metadata:
  name: lerobot-console
  labels: { app: lerobot-console }
spec:
  type: ClusterIP
  selector: { app: lerobot-console }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
