# Public L4 LoadBalancer (Volcengine CLB) — forwards :443 straight to the console
# (which terminates TLS itself, see deployment.yaml). Plain L4 passthrough; the
# CLB does NOT terminate TLS, the console does.
#
# Point users at https://<this LB's public IP>/ (self-signed cert → browser warns
# once). Reachable on accounts where ALB HTTPS isn't (ALB needs a 证书中心 cert-id
# that can't be created via kubectl); CLB inbound works (same path LiveKit uses).
apiVersion: v1
kind: Service
metadata:
  name: lerobot-console-clb
  labels: { app: lerobot-console }
  annotations:
    service.beta.kubernetes.io/volcengine-loadbalancer-address-type: "internet"
    # Per-deployment: a subnet in your cluster's VPC.
    service.beta.kubernetes.io/volcengine-loadbalancer-subnet-id: "<your-subnet-id>"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector: { app: lerobot-console }
  ports:
    - { name: https, port: 443, targetPort: 8080, protocol: TCP }   # 443 -> console HTTPS :8080
