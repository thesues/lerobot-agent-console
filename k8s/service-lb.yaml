# Public L4 LoadBalancer (Volcengine CLB) — forwards :80 straight to the console
# on :8080 (plain HTTP by default; see deployment.yaml). Plain L4 passthrough.
#
# Point users at http://<this LB's public IP>/ . Reachable on accounts where ALB
# isn't (ALB HTTPS needs a 证书中心 cert-id that can't be created via kubectl); CLB
# inbound works (same path LiveKit uses). For HTTPS, give the console a TLS cert
# and change this listener to port 443 (see deployment.yaml header).
apiVersion: v1
kind: Service
metadata:
  name: lerobot-console-clb
  labels: { app: lerobot-console }
  annotations:
    service.beta.kubernetes.io/volcengine-loadbalancer-address-type: "internet"
    # Per-deployment: a subnet in your cluster's VPC.
    service.beta.kubernetes.io/volcengine-loadbalancer-subnet-id: "<your-subnet-id>"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector: { app: lerobot-console }
  ports:
    - { name: http, port: 80, targetPort: 8080, protocol: TCP }   # 80 -> console HTTP :8080
