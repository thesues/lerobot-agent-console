# Public HTTPS via a Volcengine VKE ALB (L7). Annotation format verified against
# this cluster's existing `alb`-class ingress (ingress.vke.volcengine.com/*).
#
# Prereqs:
#   - the ALB ingress controller addon is installed (IngressClass `alb` exists)
#   - an uploaded server certificate in Volcengine 证书中心 → put its id in
#     `loadbalancer-cert-id` below (HTTPS terminates at the ALB)
#   - the console Service (k8s/service.yaml, ClusterIP :8080) is applied
#
# WebSocket: ALB (L7) supports it; the page is served over https so the frontend
# dials wss:// automatically (term/chat/control/proxy all work).
#
# NOTE: health check points at /healthz (UNauthenticated) — /api/status is behind
# Basic auth and would return 401, marking the backend unhealthy.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lerobot-console
  namespace: default
  labels: { app: lerobot-console }
  annotations:
    # --- listener: HTTPS on 443 ---
    ingress.vke.volcengine.com/loadbalancer-protocol: https
    ingress.vke.volcengine.com/loadbalancer-port: "443"
    # TLS server cert from Volcengine 证书中心 (REQUIRED for https). Set yours:
    ingress.vke.volcengine.com/loadbalancer-cert-id: "<your-cert-id>"
    # redirect plain HTTP:80 → HTTPS:443 (drop if you don't want a :80 listener)
    ingress.vke.volcengine.com/loadbalancer-redirect-protocol: https
    # --- backend + health check (must be the open /healthz, not /api/status) ---
    ingress.vke.volcengine.com/loadbalancer-backend-protocol: http
    ingress.vke.volcengine.com/loadbalancer-healthcheck-enabled: "true"
    ingress.vke.volcengine.com/loadbalancer-healthcheck-protocol: http
    ingress.vke.volcengine.com/loadbalancer-healthcheck-method: GET
    ingress.vke.volcengine.com/loadbalancer-healthcheck-path: /healthz
    ingress.vke.volcengine.com/loadbalancer-healthcheck-httpcode: http_2xx,http_3xx
    ingress.vke.volcengine.com/loadbalancer-healthcheck-interval: "2"
    ingress.vke.volcengine.com/loadbalancer-healthcheck-timeout: "2"
    ingress.vke.volcengine.com/loadbalancer-healthy-threshold: "3"
    ingress.vke.volcengine.com/loadbalancer-unhealthy-threshold: "3"
    ingress.vke.volcengine.com/loadbalancer-scheduler: wrr
    ingress.vke.volcengine.com/loadbalancer-pass-through: "true"
    # Reuse an existing ALB instance instead of auto-creating a new one. Omit to
    # let the controller create a fresh ALB. (This cluster already has one:)
    # ingress.vke.volcengine.com/alb-instance-name: alb-kbchwphbss6s
spec:
  ingressClassName: alb
  rules:
    # Set your domain (the cert's CN/SAN must match). Use "*" host only if your
    # cert/ALB allow it; a real domain is recommended for HTTPS.
    - host: console.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lerobot-console
                port:
                  number: 8080
